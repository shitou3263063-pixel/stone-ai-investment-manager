name: Stone AI CN Pre-open Report

on:
  schedule:
    # GitHub cron uses UTC. 00:35 UTC = 08:35 Asia/Shanghai year-round.
    - cron: "35 0 * * 1-5"
  workflow_dispatch:

concurrency:
  # CN and US reports use different concurrency groups and never cancel each other.
  group: stone-ai-cn-preopen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONIOENCODING: utf-8
      REPORT_RUN_LABEL: ${{ github.event_name == 'schedule' && '北京时间 08:35' || '手动运行｜北京时间报表' }}
      REPORT_INSTANCE_ID: CN_PREOPEN
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_ENABLED: ${{ secrets.OPENAI_ENABLED }}
      OPENAI_MAX_RETRIES: ${{ secrets.OPENAI_MAX_RETRIES }}
      OPENAI_TIMEOUT_SECONDS: ${{ secrets.OPENAI_TIMEOUT_SECONDS }}
      MAX_LLM_RETRIES: ${{ secrets.MAX_LLM_RETRIES }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p logs
          set -o pipefail
          pytest 2>&1 | tee logs/pytest.log

      - name: Run Stone AI Investment Manager Pro V12.7.1 Final Freeze
        id: production
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p logs
          set -o pipefail
          python main.py 2>&1 | tee logs/main.log

      - name: Send main.py failure notification email
        if: always() && steps.production.outcome == 'failure'
        continue-on-error: true
        run: python scripts/send_workflow_failure_email.py

      - name: Upload CN reports and logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stone-ai-cn-preopen-reports-${{ github.run_id }}
          path: |
            reports/
            logs/
            outputs/
          if-no-files-found: warn
          retention-days: 30

      - name: Finalize workflow status
        if: always()
        shell: bash
        run: |
          test_outcome="${{ steps.tests.outcome }}"
          production_outcome="${{ steps.production.outcome }}"

          if [[ "$production_outcome" != "success" ]]; then
            echo "::error::CN pre-open python main.py failed; failure notification and complete logs were processed."
            exit 1
          fi

          if [[ "$test_outcome" != "success" ]]; then
            echo "::error::pytest failed; the CN pre-open report still ran and was sent."
            exit 1
          fi

          echo "Tests and CN pre-open report production both succeeded."
