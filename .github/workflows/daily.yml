name: Daily Stone AI Investment Report

on:
  schedule:
    # 中国资产与亚洲市场晨间复核：北京时间每天08:30。
    - cron: "30 8 * * *"
      timezone: "Asia/Shanghai"
    # 美股市场晨间复核：纽约时间每天08:30；自动适配EST/EDT夏令时。
    # 使用等价但不同的星期表达式，以便邮件主题识别触发来源。
    - cron: "30 8 * * 0-6"
      timezone: "America/New_York"
  workflow_dispatch:

concurrency:
  group: stone-ai-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONIOENCODING: utf-8
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_ENABLED: ${{ secrets.OPENAI_ENABLED }}
      OPENAI_MAX_RETRIES: ${{ secrets.OPENAI_MAX_RETRIES }}
      OPENAI_TIMEOUT_SECONDS: ${{ secrets.OPENAI_TIMEOUT_SECONDS }}
      MAX_LLM_RETRIES: ${{ secrets.MAX_LLM_RETRIES }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Service health check
        run: python scripts/check_all_services.py

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p logs
          set -o pipefail
          pytest 2>&1 | tee logs/pytest.log

      - name: Run Stone AI Investment Manager Pro V12.7.1 Final Freeze
        id: production
        if: always()
        continue-on-error: true
        shell: bash
        env:
          REPORT_RUN_LABEL: ${{ github.event.schedule == '30 8 * * 0-6' && '美东时间 08:30' || (github.event.schedule == '30 8 * * *' && '北京时间 08:30' || '手动运行') }}
        run: |
          mkdir -p logs
          set -o pipefail
          python main.py 2>&1 | tee logs/main.log

      - name: Send main.py failure notification email
        if: always() && steps.production.outcome == 'failure'
        continue-on-error: true
        run: python scripts/send_workflow_failure_email.py

      - name: Upload reports and logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stone-ai-investment-reports-${{ github.run_id }}
          path: |
            reports/
            logs/
            outputs/
          if-no-files-found: warn
          retention-days: 30

      - name: Finalize workflow status
        if: always()
        shell: bash
        run: |
          test_outcome="${{ steps.tests.outcome }}"
          production_outcome="${{ steps.production.outcome }}"

          if [[ "$production_outcome" != "success" ]]; then
            echo "::error::python main.py failed; failure notification and complete logs were processed."
            exit 1
          fi

          if [[ "$test_outcome" != "success" ]]; then
            echo "::error::pytest failed; the daily report still ran and was sent."
            exit 1
          fi

          echo "Tests and daily report production both succeeded."
