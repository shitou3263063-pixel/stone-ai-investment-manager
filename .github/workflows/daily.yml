name: Daily Stone AI Investment Report

on:
  schedule:
    # 00:30 UTC = 北京时间 08:30
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stone AI Investment Manager Pro V12
        env:
          PYTHONIOENCODING: utf-8
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
          WECOM_AGENT_ID: ${{ secrets.WECOM_AGENT_ID }}
          WECOM_SECRET: ${{ secrets.WECOM_SECRET }}
          WECOM_USER_ID: ${{ secrets.WECOM_USER_ID }}
        run: python run.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: stone-ai-investment-reports
          path: reports/
          if-no-files-found: error
