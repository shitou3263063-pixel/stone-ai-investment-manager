name: Daily Stone AI Investment Report

on:
  schedule:
    # 00:30 UTC = 北京时间 08:30
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONIOENCODING: utf-8
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      MAX_LLM_RETRIES: ${{ secrets.MAX_LLM_RETRIES }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Service health check
        run: python scripts/check_all_services.py

      - name: Run tests
        run: pytest

      - name: Run Stone AI Investment Manager Pro V12.5 Stable
        run: python main.py

      - name: Upload reports and logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stone-ai-investment-reports
          path: |
            reports/
            logs/
          if-no-files-found: warn
