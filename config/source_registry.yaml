config_version: V12.7.1_FINAL_FREEZE
config_role: production_data_source_priority_authority
schema_version: 1
source_defaults:
  supported_markets: []
  supported_fields: []
  expected_frequency: EVENT_DRIVEN
  timeout: 20
  retry_policy:
    max_attempts: 2
    backoff_seconds: 2
  cache_policy:
    enabled: true
    stale_if_error: true
  freshness_policy:
    mode: frequency_aware
  authentication_required: false
  license_or_usage_note: "仅按供应商许可条款用于内部投资辅助；不得再分发或伪造。"
  fallback_order: []
  enabled: true
  health_status: UNKNOWN
policy:
  official_source_precedence: true
  unregistered_source_policy: block_trade_conclusion
  tier1_coverage_min: 0.80
  critical_metric_coverage_min: 0.85
  low_coverage_dqs_cap: 69
  verification_warning_dqs_cap: 84
  key_metric_double_source:
    - price
    - vix
    - yield
    - fx
  trade_candidate_evidence:
    required_groups:
      - market_valuation
      - macro_fundamental
      - flow_volatility_behavior
    rule: "任何交易候选必须同时具备市场/估值、宏观/基本面、资金流/波动率/行为三类独立证据；不满足时只能进入观察或待复核。"

sources:
  fred:
    name: "FRED"
    tier: 1
    type: official
    provider_name: "Federal Reserve Economic Data"
    supported_markets: [US_MACRO]
    supported_fields: [yield, spread, cpi, ppi, pce, unemployment, gdp]
    expected_frequency: DAILY_OFFICIAL_MACRO
    authentication_required: true
    fallback_order: [local_cache]
  treasury:
    name: "U.S. Treasury"
    tier: 1
    type: official
    supported_markets: [US_MACRO]
    supported_fields: [yield]
    expected_frequency: DAILY_OFFICIAL_MACRO
    fallback_order: [fred, local_cache]
  cboe_official:
    name: "Cboe Official"
    tier: 1
    type: official
    supported_markets: [US]
    supported_fields: [vix, put_call_ratio]
    expected_frequency: INTRADAY
    fallback_order: [yfinance, local_cache]
  sec_edgar:
    name: "SEC EDGAR"
    tier: 1
    type: official
  hkex:
    name: "HKEX"
    tier: 1
    type: official
  sse:
    name: "Shanghai Stock Exchange"
    tier: 1
    type: official
  szse:
    name: "Shenzhen Stock Exchange"
    tier: 1
    type: official
  alpha_vantage:
    name: "Alpha Vantage"
    tier: 2
    type: professional_api
    supported_markets: [US, FX]
    supported_fields: [price, fx]
    expected_frequency: DAILY_MARKET_CLOSE
    authentication_required: true
    fallback_order: [finnhub, yfinance, local_cache]
  finnhub:
    name: "Finnhub"
    tier: 2
    type: professional_api
    supported_markets: [US, HK, CN]
    supported_fields: [price, company_news]
    expected_frequency: INTRADAY
    authentication_required: true
    fallback_order: [yfinance, local_cache]
  yfinance:
    name: "yfinance"
    tier: 3
    type: free_aggregator
    supported_markets: [US, HK, CN, FX]
    supported_fields: [price, fx]
    expected_frequency: DAILY_MARKET_CLOSE
    license_or_usage_note: "Tier 3聚合备用源；关键行情不得把它显示为官方源。"
    fallback_order: [local_cache]
  tushare_pro:
    name: "Tushare Pro"
    tier: 2
    type: authorized_api
    supported_markets: [CN]
    supported_fields: [price, valuation, fundamentals, trade_calendar]
    expected_frequency: DAILY_MARKET_CLOSE
    authentication_required: true
    fallback_order: [akshare, local_cache]
  akshare:
    name: "AKShare (monitored fallback)"
    tier: 3
    type: monitored_aggregator_fallback
    supported_markets: [CN, HK]
    supported_fields: [price, valuation, fundamentals, trade_calendar]
    expected_frequency: DAILY_MARKET_CLOSE
    license_or_usage_note: "受监控的Tier 3备用路由；必须保留底层供应商与冲突审计。"
    fallback_order: [local_cache]
    requirements:
      underlying_provider_required: true
      schema_validation_required: true
      stale_data_blocks_high_confidence: true
      source_conflict_blocks_scoring: true
  hkma_official:
    name: "Hong Kong Monetary Authority Open API"
    tier: 1
    type: official
    supported_markets: [HK, FX]
    supported_fields: [hibor, exchange_rate]
    expected_frequency: DAILY_OFFICIAL_MACRO
    fallback_order: [local_cache]
  cninfo_official:
    name: "CNINFO Official Disclosure Platform"
    tier: 1
    type: official
    supported_markets: [CN]
    supported_fields: [announcement]
    expected_frequency: EVENT_DRIVEN
    fallback_order: [local_cache]
  hkex_official:
    name: "HKEXnews"
    tier: 1
    type: official
    supported_markets: [HK]
    supported_fields: [announcement, price_reference]
    expected_frequency: EVENT_DRIVEN
    fallback_order: [local_cache]
  local_cache:
    name: "Local Cache"
    tier: 3
    type: cache
    supported_markets: [US, HK, CN, FX, US_MACRO]
    supported_fields: [price, fx, macro, announcement]
    expected_frequency: EVENT_DRIVEN
    cache_policy:
      enabled: true
      stale_if_error: true
      immutable_source_attribution: true
    license_or_usage_note: "仅重放已记录的原始来源值；不得改写为官方源。"
  market_data_csv:
    name: "Manual market_data.csv"
    tier: 4
    type: manual
    supported_markets: [US, HK, CN, FX]
    supported_fields: [manual_reference]
    expected_frequency: EVENT_DRIVEN
    cache_policy:
      enabled: false
    license_or_usage_note: "用户维护的人工参考值；不得冒充实时行情。"
  media_news:
    name: "Registered Media News"
    tier: 4
    type: media
    supported_markets: [GLOBAL]
    supported_fields: [news_explanation]
    expected_frequency: EVENT_DRIVEN
    cache_policy:
      enabled: false
    license_or_usage_note: "仅用于解释，不得作为成交、估值或交易权限事实。"

categories:
  macro:
    primary_source: fred
    backup_source: local_cache
    source_tier: tier_1_official
    freshness_limit: 45d
    verification_requirement: official_or_cache_with_timestamp
  market:
    primary_source: alpha_vantage
    backup_source: finnhub
    source_tier: tier_2_professional_api
    freshness_limit: 2d
    verification_requirement: dual_source_for_key_price
  index:
    primary_source: cboe_official
    backup_source: yfinance
    source_tier: tier_1_official_for_vix
    freshness_limit: 2d
    verification_requirement: dual_source_for_vix_and_index
  company_filings:
    primary_source: sec_edgar
    backup_source: finnhub
    source_tier: tier_1_official
    freshness_limit: 7d
    verification_requirement: official_preferred_over_media
  fund_flow:
    primary_source: finnhub
    backup_source: alpha_vantage
    source_tier: tier_2_professional_api
    freshness_limit: 7d
    verification_requirement: independent_behavior_or_volume_confirmation
  news:
    primary_source: finnhub
    backup_source: media_news
    source_tier: tier_2_professional_api
    freshness_limit: 3d
    verification_requirement: explanation_only_not_trade_fact

