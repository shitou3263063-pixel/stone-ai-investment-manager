config_version: V12.6_STABLE
config_role: production_smart_grid_authority

smart_grid:
  enabled: true
  auto_trade: false
  paper_mode: true
  live_advice_enabled: false

  portfolio:
    total_grid_capital_pct: 4
    max_total_grid_capital_pct: 8
