version: 1
mode: observation_only

symbols:
  - {symbol: VOO, route_symbol: VOO, asset_name: Vanguard S&P 500 ETF, market: US}
  - {symbol: NVDA, route_symbol: NVDA, asset_name: NVIDIA, market: US}
  - {symbol: GOOG, route_symbol: GOOG, asset_name: Alphabet, market: US}
  - {symbol: TLT, route_symbol: TLT, asset_name: iShares 20+ Year Treasury Bond ETF, market: US}
  - {symbol: IBKR, route_symbol: IBKR, asset_name: Interactive Brokers, market: US}
  - {symbol: XLF, route_symbol: XLF, asset_name: Financial Select Sector SPDR Fund, market: US}
  - {symbol: BABA, route_symbol: BABA, asset_name: Alibaba ADR, market: US}
  - {symbol: 03033.HK, route_symbol: 03033.HK, asset_name: CSOP Hang Seng TECH Index ETF, market: HK}
  - {symbol: '513060', route_symbol: 513060.SS, asset_name: Hang Seng Healthcare ETF, market: CN}
  - {symbol: '513090', route_symbol: 513090.SS, asset_name: Hong Kong Securities ETF, market: CN}
  - {symbol: '510300', route_symbol: 510300.SS, asset_name: CSI 300 ETF, market: CN}
  - {symbol: '002558', route_symbol: 002558.SZ, asset_name: Giant Network, market: CN}

market_clock:
  # Basic holiday interface. Add exchange-confirmed YYYY-MM-DD dates here.
  holidays:
    CN: []
    HK: []
    US: []

freshness:
  intraday_max_age_minutes: 15
  future_tolerance_minutes: 2
  closed_market_max_age_hours: 120

source_routing:
  source_priority:
    US: [futu, finnhub, alpha_vantage, yfinance]
    HK: [futu, finnhub, yfinance]
    CN: [finnhub, yfinance]
  source_conflict_threshold: 1.0
  allow_delayed_quotes: true

futu:
  host: 127.0.0.1
  port: 11111
  realtime_max_age_seconds: 90
  delayed_max_age_seconds: 1200
  market_state_cache_seconds: 20

intervals:
  trading_interval_seconds: 60
  closed_interval_seconds: 900
  weekend_interval_seconds: 3600

retry:
  retry_initial_seconds: 30
  retry_max_seconds: 900
  failure_threshold: 3

change_calculation:
  five_minute_tolerance_seconds: 120
  fifteen_minute_tolerance_seconds: 180

process_lock:
  lock_file_path: data/monitoring/intraday_monitor.lock
  stale_lock_timeout_seconds: 7200

retention:
  snapshot_retention_days: 7
  alert_retention_days: 30
  source_health_retention_days: 30

rules:
  price_5m:
    enabled: true
    threshold_percent: 2.0
    severity: WATCH
  price_15m:
    enabled: true
    threshold_percent: 3.0
    severity: WARNING
  daily_change:
    enabled: true
    threshold_percent: 5.0
    severity: CRITICAL
  data_stale:
    enabled: true
    severity: WARNING
  source_conflict:
    enabled: true
    severity: CRITICAL
  all_sources_failed:
    enabled: true
    severity: CRITICAL

cooldowns_minutes:
  WATCH: 60
  WARNING: 60
  CRITICAL: 60

runtime:
  max_workers: 4

storage:
  sqlite_path: data/monitoring/intraday_monitor.sqlite3

logging:
  structured_log_path: logs/intraday_monitor/intraday_monitor.jsonl

# Formal application layer. Email remains opt-in and dry-run by default.
application:
  enabled: true
  symbols: [VOO, NVDA, GOOG, TLT, IBKR, XLF, BABA, '03033']
  interval_seconds: 60
  email_alerts_enabled: false
  email_dry_run: true
  alert_cooldown_minutes: 60
  consecutive_failure_threshold: 3
  max_quote_delay_seconds: 300
  move_5m_threshold_pct: 2.0
  move_15m_threshold_pct: 3.0
  day_move_threshold_pct: 5.0
  sqlite_path: data/monitoring/intraday_monitor.sqlite3
  log_path: logs/intraday_monitor/intraday_monitor.jsonl
  report_snapshot_max_age_minutes: 30
